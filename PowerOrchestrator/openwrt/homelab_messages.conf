# --- Proxmox Resource Monitor Notifications ---
# Sent by Proxmox when system resources or health metrics cross thresholds
# Variables available dynamically: $VALUE, $THRESHOLD, $PATH, $SERVICE, $POOL, $VMID, $GUEST_NAME
MSG_MONITOR_CPU_ALERT="⚠️ *[Proxmox Warning]* CPU Load is high: *\$VALUE%* (Threshold: \$THRESHOLD%)"
MSG_MONITOR_CPU_OK="✅ *[Proxmox Recovery]* CPU Load returned to normal: *\$VALUE%*"
MSG_MONITOR_RAM_ALERT="⚠️ *[Proxmox Warning]* RAM usage is high: *\$VALUE%* (Threshold: \$THRESHOLD%)"
MSG_MONITOR_RAM_OK="✅ *[Proxmox Recovery]* RAM usage returned to normal: *\$VALUE%*"
MSG_MONITOR_DISK_ALERT="⚠️ *[Proxmox Warning]* Disk space on *\$PATH* is high: *\$VALUE%* (Threshold: \$THRESHOLD%)"
MSG_MONITOR_DISK_OK="✅ *[Proxmox Recovery]* Disk space on *\$PATH* returned to normal: *\$VALUE%*"
MSG_MONITOR_SERVICE_ALERT="⚠️ *[Proxmox Warning]* Service *\$SERVICE* is NOT running!"
MSG_MONITOR_SERVICE_OK="✅ *[Proxmox Recovery]* Service *\$SERVICE* is running again."
MSG_MONITOR_ZFS_ALERT="🚨 *[Proxmox Alert]* ZFS pool status is unhealthy: *\$VALUE*"
MSG_MONITOR_ZFS_OK="✅ *[Proxmox Recovery]* ZFS pools are healthy now."
MSG_MONITOR_GUEST_ALERT="⚠️ *[Proxmox Warning]* Critical guest *\$GUEST_NAME* (VMID \$VMID) is NOT running!"
MSG_MONITOR_GUEST_OK="✅ *[Proxmox Recovery]* Critical guest *\$GUEST_NAME* (VMID \$VMID) is running again."
