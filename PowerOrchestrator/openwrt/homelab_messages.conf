# =============================================================================
# Homelab Power Orchestrator Telegram & Discord Notification Messages Configuration
# File: /etc/homelab_messages.conf
# =============================================================================

# --- General System Status / Power Daemon Notifications ---
# Sent when the power proxy daemon detects host power transition events
MSG_DAEMON_AWAKE="[Host Online] Proxmox host is awake! Self-hosted services are fully accessible."
MSG_DAEMON_SLEEP="[Host Sleeping] Proxmox host has successfully entered S3 Suspend-to-RAM. Redirection proxies and WoL triggers are active."
MSG_DAEMON_SHUTDOWN="[Host Shutdown] Proxmox host has been shut down cleanly."
MSG_DAEMON_REBOOT="[Host Rebooting] Proxmox host is rebooting..."
MSG_DAEMON_SHUTDOWN_AWAKE="[Host Restored] Proxmox host has been powered back on and is online!"
MSG_DAEMON_REBOOT_AWAKE="[Host Restored] Proxmox host has successfully rebooted and is back online!"

# --- Traffic & Port Wake Listeners ---
# Variables available dynamically: $PORT_RAW, $VMID, $GUEST_IP, $HOST_MAC
MSG_WAKE_GUEST_DEMAND="[Guest Wake-on-Demand] Traffic detected on port \`$PORT_RAW\`! Successfully resumed Guest ID *\$VMID* (\$GUEST_IP) on Proxmox."
MSG_WAKE_GAME_PLAYER="[Player Connection] Player detected on game port \`$PORT_RAW\`! Sending Wake-on-LAN magic packet to ProxmoxNIC..."

# --- Web Landing Page (CGI status) Notifications ---
# Variables available dynamically: $GUEST_NAME, $VMID
MSG_WEB_WAKE_GUEST_WAKING_HOST="[Waking Guest] Web wake request received for *\$GUEST_NAME* (VMID \$VMID). Waking physical host first..."
MSG_WEB_WAKE_GUEST="[Waking Guest] Web wake request received for *\$GUEST_NAME* (VMID \$VMID). Resuming guest node..."
MSG_WEB_GUEST_AWAKE="[Success] *\$GUEST_NAME* is now Awake and Online! Ready to connect."
MSG_WEB_WAKE_HOST="[Waking Host] Wake-on-LAN request received for *Homelab Host* via Waking Web Page."
MSG_WEB_HOST_AWAKE="[Success] *Homelab Host* is now Awake and Online! Dashboard is accessible."

# --- Proxmox VE Idle Monitor Notifications ---
# Sent by Proxmox when guests enter dynamic idle sleep
# Variables available dynamically: $VMID, $GUEST_NAME, $TIMEOUT_MIN
MSG_PROXMOX_GUEST_SUSPENDED="[Guest Idle Sleep] Service *\$GUEST_NAME* (VMID \$VMID) was idle for \$TIMEOUT_MIN minutes and has been successfully suspended to reclaim system resources!"
MSG_PROXMOX_GUEST_STOPPED="[Guest Idle Sleep] Service *\$GUEST_NAME* (VMID \$VMID) was idle for \$TIMEOUT_MIN minutes and has been stopped cleanly to reclaim system resources!"
MSG_PROXMOX_HOST_SLEEPING="[Proxmox Host Sleeping] Host is entering S3 Suspend-to-RAM. All system states successfully saved!"
MSG_PROXMOX_HOST_AWAKE="[Proxmox Host Awake] Host successfully woke up from ACPI S3 sleep. Restoring all guest VMs..."

# --- Telegram Bot Response Messages ---
MSG_BOT_HELP="[Homelab Power Orchestrator Bot]
Available commands:

Host Power Control:
• /status - Check host power and PVE resource status
• /wake - Wake the Proxmox host (Wake-on-LAN)
• /sleep - Safe sleep (only if system is completely idle)
• /sleepforce - Force sleep immediately (skips idle checks)
• /hostshutdown - Safe shutdown (only if no guest nodes are running)
• /hostshutdownforce - Force shutdown immediately (ignores running guests)
• /hostreboot - Safe reboot (only if no guest nodes are running)
• /hostrebootforce - Force reboot immediately (ignores running guests)

Guest Node Control:
• /list - List all LXC containers and VMs
• /ctstart <vmid> - Start/wake a specific VM or container
• /ctstop <vmid> - Gracefully stop/shutdown a specific VM or container
• /ctrestart <vmid> - Restart a specific VM or container"

MSG_BOT_QUERY_STATUS="[Status] Querying Proxmox host status, please wait..."
