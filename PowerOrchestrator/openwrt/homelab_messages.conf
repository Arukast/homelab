# =============================================================================
# Homelab Power Orchestrator Telegram Notification Messages Configuration
# File: /etc/homelab_messages.conf
# =============================================================================

# --- General System Status / Power Daemon Notifications ---
# Sent when the power proxy daemon detects host power transition events
MSG_DAEMON_AWAKE="⚡ Proxmox host is awake. Self-hosted services are fully accessible!"
MSG_DAEMON_SLEEP="😴 Proxmox host entered sleep (S3). Redirection proxy and Wake-on-Demand triggers are active!"

# --- Traffic & Port Wake Listeners ---
# Variables available dynamically: $PORT_RAW, $VMID, $GUEST_IP, $HOST_MAC
MSG_WAKE_GUEST_DEMAND="⚡ *Guest Wake-on-Demand:* Traffic detected on port \$PORT_RAW! Successfully resumed Guest ID \$VMID (\$GUEST_IP) on Proxmox."
MSG_WAKE_GAME_PLAYER="🎮 *Game Player Connection:* Player detected on port \$PORT_RAW! Sending Wake-on-LAN to Proxmox (\$HOST_MAC)..."

# --- Web Landing Page (CGI status) Notifications ---
# Variables available dynamically: $GUEST_NAME, $VMID
MSG_WEB_WAKE_GUEST_WAKING_HOST="🌐 *Waking Guest:* Web wake request received for *\$GUEST_NAME* (VMID \$VMID). Waking host first..."
MSG_WEB_WAKE_GUEST="🌐 *Waking Guest:* Web wake request received for *\$GUEST_NAME* (VMID \$VMID)."
MSG_WEB_GUEST_AWAKE="✅ *\$GUEST_NAME* is now Awake and Online! Ready to connect."
MSG_WEB_WAKE_HOST="⚡ *Waking Host:* Wake-on-LAN request received for *Homelab Host* via Waking Web Page."
MSG_WEB_HOST_AWAKE="✅ *Homelab Host* is now Awake and Online! Dashboard is accessible."

# --- Telegram Bot Response Messages ---
MSG_BOT_HELP="🤖 *Homelab Power Orchestrator Bot*
Available commands:

⚡ *Host Power Control:*
👉 /status - Check host power and PVE resource status
👉 /wake - Wake the Proxmox host (Wake-on-LAN)
👉 /sleep - Safely suspend guest nodes and sleep host
👉 /host_shutdown - Gracefully shutdown the Proxmox host
👉 /host_reboot - Reboot the Proxmox host

🖥️ *Guest Node Control:*
👉 /list - List all LXC containers and VMs
👉 /ct_start <vmid> - Start a specific VM or container
👉 /ct_stop <vmid> - Stop a specific VM or container
👉 /ct_restart <vmid> - Restart a specific VM or container"

MSG_BOT_QUERY_STATUS="🔍 Querying Proxmox host status, please wait..."
MSG_BOT_HOST_SLEEPING="😴 *Host Status:* Proxmox is currently *SLEEPING* (Offline)."
MSG_BOT_SSH_FAILED="⚠️ *Error:* Connected to Proxmox IP but SSH connection failed. Check dropbear SSH keys."
MSG_BOT_WOL_SENT="⚡ Sending Wake-on-LAN magic packet to Proxmox (\$HOST_MAC)..."
MSG_BOT_WOL_DISPATCHED="✅ Magic packet dispatched! Host should be online in 30-45 seconds."

MSG_BOT_SLEEP_ALREADY_OFFLINE="😴 Host is already offline/sleeping."
MSG_BOT_SLEEP_TRIGGERED="💤 Triggering manual sleep sequence on Proxmox..."
MSG_BOT_SLEEP_EXECUTED="✅ Sleep command executed. Proxmox will gracefully suspend guests and sleep."

MSG_BOT_SHUTDOWN_ALREADY_OFFLINE="😴 Host is already offline."
MSG_BOT_SHUTDOWN_SENDING="🛑 Sending shutdown command to Proxmox host..."
MSG_BOT_SHUTDOWN_EXECUTED="✅ Shutdown initiated."

MSG_BOT_REBOOT_ALREADY_OFFLINE="😴 Host is offline."
MSG_BOT_REBOOT_SENDING="🔄 Sending reboot command to Proxmox host..."
MSG_BOT_REBOOT_EXECUTED="✅ Reboot initiated."

MSG_BOT_LIST_HOST_OFFLINE="😴 Cannot list guest nodes: Proxmox host is offline."

MSG_BOT_CT_START_USAGE="⚠️ Usage: \`/ct_start <vmid>\`"
MSG_BOT_CT_START_HOST_OFFLINE="😴 Host is offline. Send \`/wake\` first."
MSG_BOT_CT_START_STARTING="🚀 Starting guest node \$arg1..."
MSG_BOT_CT_START_NOT_FOUND="❌ Guest ID \$arg1 not found on Proxmox."
MSG_BOT_CT_START_SUCCESS="✅ Node start response:"

MSG_BOT_CT_STOP_USAGE="⚠️ Usage: \`/ct_stop <vmid>\`"
MSG_BOT_CT_STOP_HOST_OFFLINE="😴 Host is offline."
MSG_BOT_CT_STOP_STOPPING="🛑 Stopping guest node \$arg1..."
MSG_BOT_CT_STOP_NOT_FOUND="❌ Guest ID \$arg1 not found on Proxmox."
MSG_BOT_CT_STOP_SUCCESS="✅ Node stop response:"

MSG_BOT_CT_RESTART_USAGE="⚠️ Usage: \`/ct_restart <vmid>\`"
MSG_BOT_CT_RESTART_HOST_OFFLINE="😴 Host is offline."
MSG_BOT_CT_RESTART_RESTARTING="🔄 Restarting guest node \$arg1..."
MSG_BOT_CT_RESTART_NOT_FOUND="❌ Guest ID \$arg1 not found on Proxmox."
MSG_BOT_CT_RESTART_SUCCESS="✅ Node restart response:"

MSG_BOT_UNKNOWN_COMMAND="❓ Unknown command. Send \`/help\` to see available commands."
MSG_BOT_UNAUTHORIZED="⚠️ *Unauthorized Access:* Your Telegram User ID (\$USER_ID) is not authorized."
