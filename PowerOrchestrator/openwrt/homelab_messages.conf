MSG_BOT_SSH_FAILED="[Error] Connected to Proxmox IP but SSH connection failed. Check dropbear SSH keys."
MSG_BOT_WOL_SENT="[WOL] Sending Wake-on-LAN magic packet to Proxmox (\$HOST_MAC)..."
MSG_BOT_WOL_DISPATCHED="[Success] Magic packet dispatched! Host should be online in 30-45 seconds."

MSG_BOT_SLEEP_ALREADY_OFFLINE="[Status] Host is already offline/sleeping."
MSG_BOT_SLEEP_TRIGGERED="[Sleep] Triggering safe manual sleep cycle on Proxmox..."
MSG_BOT_SLEEP_FORCE_TRIGGERED="[Sleep] Triggering FORCED sleep sequence on Proxmox (skipping idle checks)..."
MSG_BOT_SLEEP_EXECUTED="[Success] Sleep command executed. Proxmox will gracefully suspend guests and sleep."

MSG_BOT_SHUTDOWN_ALREADY_OFFLINE="[Status] Host is already offline."
MSG_BOT_SHUTDOWN_BLOCKED="[Shutdown Blocked] There are active guest nodes running. Please stop them first, or use /hostshutdownforce to bypass this check."
MSG_BOT_SHUTDOWN_SENDING="[Shutdown] Checking status and sending graceful shutdown command to Proxmox host..."
MSG_BOT_SHUTDOWN_FORCE_SENDING="[Shutdown] Sending FORCED shutdown command to Proxmox host..."
MSG_BOT_SHUTDOWN_EXECUTED="[Success] Shutdown initiated."

