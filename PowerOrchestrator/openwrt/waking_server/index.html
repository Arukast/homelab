<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homelab Power Orchestrator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-green: #10b981;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Glowing background blobs */
        .glow-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            z-index: 1;
            pointer-events: none;
        }

        .glow-1 {
            width: 400px;
            height: 400px;
            background: var(--accent-blue);
            top: -100px;
            left: -100px;
        }

        .glow-2 {
            width: 500px;
            height: 500px;
            background: var(--accent-purple);
            bottom: -150px;
            right: -100px;
        }

        /* Glassmorphism Card Container */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 48px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            z-index: 10;
            transition: all 0.5s ease;
        }

        /* Pulsating Server Ring Animation */
        .avatar-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pulse-ring {
            position: absolute;
            border: 2px solid var(--accent-blue);
            border-radius: 50%;
            opacity: 0;
            animation: pulse-out 3s infinite cubic-bezier(0.21, 0.85, 0.44, 1);
        }

        .pulse-ring:nth-child(2) {
            animation-delay: 1s;
            border-color: var(--accent-purple);
        }

        .pulse-ring:nth-child(3) {
            animation-delay: 2s;
            border-color: var(--accent-blue);
        }

        .server-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
            z-index: 2;
            transition: all 0.5s ease;
        }

        .server-avatar svg {
            width: 38px;
            height: 38px;
            fill: #ffffff;
            transition: all 0.5s ease;
        }

        /* Server State Indicators */
        .server-avatar.online {
            background: linear-gradient(135deg, var(--accent-green) 0%, #059669 100%);
            box-shadow: 0 0 35px rgba(16, 185, 129, 0.6);
        }

        /* Typography */
        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #ffffff 0%, #d1d5db 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        /* Glowing Progress Bar */
        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 100px;
            overflow: hidden;
            margin-bottom: 24px;
            position: relative;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue) 0%, var(--accent-purple) 100%);
            border-radius: 100px;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
            transition: width 0.3s ease;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #eab308;
            box-shadow: 0 0 8px #eab308;
            animation: blink 1.5s infinite ease-in-out;
        }

        .status-dot.online {
            background: var(--accent-green);
            box-shadow: 0 0 8px var(--accent-green);
            animation: none;
        }

        /* Animations */
        @keyframes pulse-out {
            0% {
                width: 80px;
                height: 80px;
                opacity: 0.8;
            }
            100% {
                width: 150px;
                height: 150px;
                opacity: 0;
            }
        }

        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        @keyframes success-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .success-anim {
            animation: success-pop 0.5s ease-out forwards;
        }
    </style>
</head>
<body>
    <div class="glow-blob glow-1"></div>
    <div class="glow-blob glow-2"></div>

    <div class="card" id="main-card">
        <div class="avatar-container">
            <div class="pulse-ring" id="ring1"></div>
            <div class="pulse-ring" id="ring2"></div>
            <div class="pulse-ring" id="ring3"></div>
            <div class="server-avatar" id="avatar">
                <svg viewBox="0 0 24 24" id="server-icon">
                    <path d="M4,17H20V15H4V17M4,9H20V7H4V9M19,22H5C3.89,22 3,21.1 3,20V4C3,2.9 3.89,2 5,2H19C20.1,2 21,2.9 21,4V20C21,21.1 20.1,22 19,22M5,4V20H19V4H5M11,10H13V12H11V10M11,16H13V18H11V16Z" />
                </svg>
            </div>
        </div>

        <h1 id="title">Homelab is Sleeping</h1>
        <p id="description">Your web request has triggered a Wake-on-LAN signal. The server is booting and self-hosted services are mounting.</p>

        <div class="progress-container">
            <div class="progress-bar" id="progress"></div>
        </div>

        <div class="status-badge">
            <span class="status-dot" id="dot"></span>
            <span id="badge-text">Waking Host...</span>
        </div>
    </div>

    <script>
        let progressWidth = 0;
        const progressEl = document.getElementById('progress');
        const titleEl = document.getElementById('title');
        const descEl = document.getElementById('description');
        const avatarEl = document.getElementById('avatar');
        const ring1 = document.getElementById('ring1');
        const ring2 = document.getElementById('ring2');
        const ring3 = document.getElementById('ring3');
        const dotEl = document.getElementById('dot');
        const badgeEl = document.getElementById('badge-text');

        // Smooth progress bar pacing
        const progressInterval = setInterval(() => {
            // Speed up initially, then slow down as it gets closer to 95% (waiting for real boot)
            if (progressWidth < 60) {
                progressWidth += 2;
            } else if (progressWidth < 85) {
                progressWidth += 0.8;
            } else if (progressWidth < 95) {
                progressWidth += 0.2;
            }
            progressEl.style.width = progressWidth + '%';
        }, 300);

        // Check host boot status via local CGI script
        function checkStatus() {
            fetch('/cgi-bin/status')
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'online') {
                        clearInterval(progressInterval);
                        progressEl.style.width = '100%';
                        
                        // Apply success styling
                        titleEl.innerText = "Services Restored!";
                        descEl.innerText = "Successfully established secure connection. Redirecting to your service...";
                        avatarEl.classList.add('online', 'success-anim');
                        dotEl.classList.add('online');
                        badgeEl.innerText = "ONLINE";
                        
                        // Disable pulsing rings
                        ring1.style.animation = 'none';
                        ring2.style.animation = 'none';
                        ring3.style.animation = 'none';
                        ring1.style.opacity = '0';
                        ring2.style.opacity = '0';
                        ring3.style.opacity = '0';

                        // Success checkmark SVG injection
                        document.getElementById('server-icon').innerHTML = '<path d="M21,7L9,19L3.5,13.5L4.91,12.09L9,16.17L19.59,5.59L21,7Z" />';

                        // Wait for success animation to complete, then reload (bypassing NAT redirects)
                        setTimeout(() => {
                            window.location.reload();
                        }, 2000);
                    } else {
                        // Keep polling
                        setTimeout(checkStatus, 3000);
                    }
                })
                .catch(err => {
                    // Failures are expected during the networking swap. Keep polling.
                    console.log("Network status query failed, retrying...", err);
                    setTimeout(checkStatus, 3000);
                });
        }

        // Start polling 3 seconds after load
        setTimeout(checkStatus, 3000);
    </script>
</body>
</html>
